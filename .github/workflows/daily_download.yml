name: Daily Download

on:
  schedule:
    - cron: "30 0 * * *"   # 6:00 AM IST = 00:30 UTC
  workflow_dispatch:         # manual trigger

jobs:
  scrape-and-download:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Instagram cookies
        env:
          IG_COOKIES: ${{ secrets.IG_COOKIES }}
        run: printf '%s' "$IG_COOKIES" > /tmp/ig_cookies.txt

      - name: Set up SSH SOCKS5 proxy via Oracle VM
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_VM_IP: ${{ secrets.ORACLE_VM_IP }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H "$ORACLE_VM_IP" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/oracle_key -D 1080 -N -f \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ExitOnForwardFailure=yes \
            "ubuntu@$ORACLE_VM_IP"
          echo "ALL_PROXY=socks5h://localhost:1080" >> $GITHUB_ENV
          echo "HTTPS_PROXY=socks5h://localhost:1080" >> $GITHUB_ENV
          echo "HTTP_PROXY=socks5h://localhost:1080" >> $GITHUB_ENV
          echo "Proxy up — outbound IP: $(curl -s --socks5-hostname localhost:1080 https://api.ipify.org)"

      # Step 1: Build existing reel IDs from data/metadata/ (dedup)
      - name: Build existing reel IDs from data folder
        run: |
          python - <<'EOF'
          import json, glob, os
          existing = set()
          for fpath in glob.glob("data/metadata/*.json"):
              try:
                  with open(fpath) as fh:
                      meta = json.load(fh)
                  rid = meta.get("identity", {}).get("reel_id")
                  if rid:
                      existing.add(rid)
              except Exception:
                  pass
          with open("/tmp/existing_reel_ids.json", "w") as f:
              json.dump(list(existing), f)
          print(f"Found {len(existing)} existing reels in data/metadata/")
          EOF

      # Step 2: Scrape reels from Instagram
      - name: Scrape Instagram reels
        run: python scripts/scraper.py --mode full --out /tmp/scraper_output.json
        env:
          IG_COOKIES_FILE: /tmp/ig_cookies.txt

      # Step 3: Compute all metrics + virality scores
      - name: Compute metrics
        run: python scripts/metrics.py --in /tmp/scraper_output.json --out /tmp/metrics_output.json

      # Step 4: Download top reels to data/reels/
      - name: Download top reels
        run: |
          python scripts/downloader.py \
            --metrics-json /tmp/metrics_output.json \
            --existing-ids-json /tmp/existing_reel_ids.json \
            --out-dir data/reels \
            --out-manifest /tmp/download_manifest.json
        env:
          IG_COOKIES_FILE: /tmp/ig_cookies.txt
          YTDLP_COOKIES_FILE: /tmp/ig_cookies.txt

      # Step 5: Save metadata JSONs to data/metadata/
      - name: Save metadata to data/metadata/
        run: |
          python - <<'EOF'
          import json, os
          os.makedirs("data/metadata", exist_ok=True)
          with open("/tmp/download_manifest.json") as f:
              manifest = json.load(f)
          saved = 0
          for entry in manifest:
              if entry.get("failed"):
                  continue
              meta = entry["meta"]
              reel_id = meta["identity"]["reel_id"]
              account = meta["identity"]["account"]
              fname = f"{account}_{reel_id}.json"
              with open(f"data/metadata/{fname}", "w") as f:
                  json.dump(meta, f, indent=2)
              saved += 1
          print(f"Saved {saved} metadata files to data/metadata/")
          EOF

      # Step 6: Generate clone strategies via Groq
      - name: Generate clone strategies (Groq)
        run: python scripts/groq_context.py --in /tmp/metrics_output.json --out /tmp/groq_output.json
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_KEY }}

      # Step 7: Select best reference video
      - name: Select best reference video
        run: python scripts/selector.py --in /tmp/groq_output.json --out-selection /tmp/selection_result.json

      # Step 8: Update data/top_reference/ and data/state/selection_log.json
      - name: Update top_reference and selection_log
        run: |
          python - <<'EOF'
          import json, os, shutil
          os.makedirs("data/top_reference", exist_ok=True)
          os.makedirs("data/state", exist_ok=True)

          with open("/tmp/selection_result.json") as f:
              result = json.load(f)

          best  = result["best_meta"]
          entry = result["selection_entry"]
          reel_id = best["identity"]["reel_id"]
          account = best["identity"]["account"]

          video_fname = best["drive"]["video_filename"]
          src = f"data/reels/{video_fname}"
          if os.path.exists(src):
              shutil.copy2(src, "data/top_reference/current_best.mp4")
              print(f"Copied {video_fname} -> data/top_reference/current_best.mp4")
          else:
              print(f"Warning: video not found at {src}, skipping copy")

          with open("data/top_reference/current_best.json", "w") as f:
              json.dump(best, f, indent=2)

          log_path = "data/state/selection_log.json"
          existing_log = []
          if os.path.exists(log_path):
              with open(log_path) as f:
                  existing_log = json.load(f)
          existing_log.append(entry)
          with open(log_path, "w") as f:
              json.dump(existing_log, f, indent=2)

          print(f"top_reference updated: {account}/{reel_id}")
          EOF

      # Step 9: Commit and push everything to repo
      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily reel download $(date -u +%Y-%m-%d)"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main

      - name: Tear down SSH proxy
        if: always()
        run: pkill -f "ssh.*1080" || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ig_cookies.txt
