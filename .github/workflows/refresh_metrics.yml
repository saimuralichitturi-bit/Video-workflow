name: Refresh Metrics

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Instagram cookies
        env:
          IG_COOKIES: ${{ secrets.IG_COOKIES }}
        run: printf '%s' "$IG_COOKIES" > /tmp/ig_cookies.txt

      - name: Set up SSH SOCKS5 proxy via Oracle VM
        env:
          ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_VM_IP: ${{ secrets.ORACLE_VM_IP }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ORACLE_SSH_KEY" > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H "$ORACLE_VM_IP" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/oracle_key -D 1080 -N -f \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=60 \
            -o ExitOnForwardFailure=yes \
            "ubuntu@$ORACLE_VM_IP"
          echo "ALL_PROXY=socks5h://localhost:1080" >> $GITHUB_ENV
          echo "HTTPS_PROXY=socks5h://localhost:1080" >> $GITHUB_ENV
          echo "HTTP_PROXY=socks5h://localhost:1080" >> $GITHUB_ENV
          echo "Proxy up — outbound IP: $(curl -s --socks5-hostname localhost:1080 https://api.ipify.org)"

      # Step 1: Load existing metadata from data/metadata/
      - name: Load existing metadata from data folder
        run: |
          python - <<'EOF'
          import json, glob
          metas = []
          for fpath in glob.glob("data/metadata/*.json"):
              try:
                  with open(fpath) as fh:
                      meta = json.load(fh)
                  meta["_source_file"] = fpath
                  metas.append(meta)
              except Exception as e:
                  print(f"Failed to load {fpath}: {e}")
          with open("/tmp/existing_metadata.json", "w") as f:
              json.dump(metas, f, indent=2)
          print(f"Loaded {len(metas)} metadata files from data/metadata/")
          EOF

      # Step 2: Build reel ID list for re-scrape
      - name: Build reel ID list for re-scrape
        run: |
          python - <<'EOF'
          import json
          with open("/tmp/existing_metadata.json") as f:
              metas = json.load(f)
          reel_list = [
              {
                  "reel_id": m["identity"]["reel_id"],
                  "account": m["identity"]["account"],
                  "niche":   m["identity"]["niche"],
                  "share_count": m["raw_metrics"].get("share_count", 0),
                  "save_count":  m["raw_metrics"].get("save_count", 0),
              }
              for m in metas
          ]
          with open("/tmp/reel_ids_for_refresh.json", "w") as f:
              json.dump(reel_list, f, indent=2)
          print(f"Prepared {len(reel_list)} reels for refresh")
          EOF

      # Step 3: Re-scrape metrics from Instagram
      - name: Re-scrape metrics
        run: |
          python scripts/scraper.py \
            --mode refresh \
            --reel-ids-json /tmp/reel_ids_for_refresh.json \
            --out /tmp/refreshed_raw.json
        env:
          IG_COOKIES_FILE: /tmp/ig_cookies.txt

      # Step 4: Recompute all metrics
      - name: Recompute metrics
        run: python scripts/metrics.py --in /tmp/refreshed_raw.json --out /tmp/refreshed_metrics.json

      # Step 5: Merge refreshed metrics back into data/metadata/ files
      - name: Merge refreshed metrics into data/metadata/
        run: |
          python - <<'EOF'
          import json
          from datetime import datetime, timezone

          with open("/tmp/existing_metadata.json") as f:
              existing = json.load(f)
          with open("/tmp/refreshed_metrics.json") as f:
              refreshed = json.load(f)

          refreshed_map = {r["identity"]["reel_id"]: r for r in refreshed}
          updated = 0

          for meta in existing:
              rid      = meta["identity"]["reel_id"]
              src_file = meta.pop("_source_file", None)
              if rid in refreshed_map:
                  new = refreshed_map[rid]
                  meta["raw_metrics"]      = new["raw_metrics"]
                  meta["computed_metrics"] = new["computed_metrics"]
                  meta["retention_proxy"]  = new["retention_proxy"]
                  meta["virality"]         = new["virality"]
                  meta["decision_summary"].update({
                      k: new["decision_summary"][k]
                      for k in [
                          "virality_score", "tier", "retention_grade",
                          "engagement_rate_pct", "total_views", "total_likes",
                          "total_shares", "total_comments", "total_saves",
                          "view_velocity", "hours_since_posted", "ready_for_cloning",
                          "clone_priority"
                      ]
                      if k in new["decision_summary"]
                  })
                  meta["identity"]["last_updated_at"] = datetime.now(timezone.utc).isoformat()
                  updated += 1
              if src_file:
                  with open(src_file, "w") as f:
                      json.dump(meta, f, indent=2)

          print(f"Updated {updated}/{len(existing)} metadata records")
          EOF

      # Step 6: Re-evaluate best reference video
      - name: Re-evaluate best reference video
        run: python scripts/selector.py --in /tmp/refreshed_metrics.json --out-selection /tmp/refresh_selection.json

      # Step 7: Update data/top_reference/ if best changed
      - name: Update top_reference
        run: |
          python - <<'EOF'
          import json, os, shutil
          os.makedirs("data/top_reference", exist_ok=True)
          os.makedirs("data/state", exist_ok=True)

          with open("/tmp/refresh_selection.json") as f:
              result = json.load(f)

          best  = result["best_meta"]
          entry = result["selection_entry"]
          reel_id = best["identity"]["reel_id"]
          account = best["identity"]["account"]

          video_fname = best["drive"]["video_filename"]
          src = f"data/reels/{video_fname}"
          if os.path.exists(src):
              shutil.copy2(src, "data/top_reference/current_best.mp4")
              print(f"Copied {video_fname} -> data/top_reference/current_best.mp4")
          else:
              print(f"Warning: video not found at {src}, skipping copy")

          with open("data/top_reference/current_best.json", "w") as f:
              json.dump(best, f, indent=2)

          log_path = "data/state/selection_log.json"
          existing_log = []
          if os.path.exists(log_path):
              with open(log_path) as f:
                  existing_log = json.load(f)
          existing_log.append(entry)
          with open(log_path, "w") as f:
              json.dump(existing_log, f, indent=2)

          print(f"top_reference updated: {account}/{reel_id}")
          EOF

      # Step 8: Commit and push updated metadata to repo
      - name: Commit and push updated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: refresh metrics $(date -u +%Y-%m-%d_%H:%M)"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main

      - name: Tear down SSH proxy
        if: always()
        run: pkill -f "ssh.*1080" || true

      - name: Cleanup
        if: always()
        run: rm -f /tmp/ig_cookies.txt
